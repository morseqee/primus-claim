<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 狂魔等级认证 — Primus</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:#0d1117; color:#fff; font-family:'Space Mono',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 16px; }
    #bgCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
    .scanlines { position:fixed; inset:0; pointer-events:none; z-index:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px); }
    .container { position:relative; z-index:1; width:100%; max-width:520px; }
    .header { text-align:center; margin-bottom:28px; }
    .logo { font-size:13px; color:#00ff94; letter-spacing:0.15em; margin-bottom:12px; }
    .title { font-size:24px; font-weight:700; color:#fff; line-height:1.1; margin-bottom:6px; }
    .subtitle { font-size:11px; color:#3a5a3a; line-height:1.6; }
    .platform-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .p-card { background:#0d1117; border:1px solid rgba(0,255,148,0.12); border-radius:10px; padding:12px 14px; cursor:pointer; transition:border-color 0.2s; }
    .p-card.active  { border-color:rgba(0,255,148,0.4); }
    .p-card.done    { border-color:rgba(0,255,148,0.3); background:rgba(0,255,148,0.04); }
    .p-card.loading { border-color:rgba(0,255,148,0.3); }
    .p-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .p-name { font-size:12px; color:#fff; font-weight:700; }
    .p-badge { font-size:10px; padding:2px 7px; border-radius:10px; }
    .badge-unverified { background:rgba(255,255,255,0.05); color:#3a5a3a; border:1px solid #2a3a2a; }
    .badge-verifying  { background:rgba(0,255,148,0.1); color:#00ff94; border:1px solid rgba(0,255,148,0.3); }
    .badge-done       { background:rgba(0,255,148,0.12); color:#00cc77; border:1px solid rgba(0,255,148,0.25); }
    .badge-error      { background:rgba(255,60,60,0.1); color:#ff6060; border:1px solid rgba(255,60,60,0.3); }
    .p-plan { font-size:11px; color:#3a5a3a; }
    .p-btn { width:100%; padding:7px; border-radius:6px; font-size:11px; font-weight:700; font-family:'Space Mono',monospace; cursor:pointer; letter-spacing:0.05em; border:none; margin-top:8px; transition:opacity 0.15s; }
    .p-btn:hover { opacity:0.85; }
    .p-btn-go       { background:rgba(0,255,148,0.12); color:#00ff94; border:1px solid rgba(0,255,148,0.3); }
    .p-btn-done     { background:#1a2a1a; color:#3a5a3a; cursor:default; }
    .p-btn-disabled { background:#111; color:#2a3a2a; cursor:default; border:1px solid #1a1a1a; }
    .generate-wrap { margin-bottom:16px; }
    .btn { width:100%; padding:13px; border-radius:8px; font-size:12px; font-weight:700; font-family:'Space Mono',monospace; cursor:pointer; letter-spacing:0.05em; border:none; transition:opacity 0.15s; }
    .btn:hover { opacity:0.85; }
    .btn-primary   { background:#00ff94; color:#0d1117; }
    .btn-secondary { background:rgba(0,255,148,0.08); color:#00ff94; border:1px solid rgba(0,255,148,0.3); }
    .btn-disabled  { background:#1a2a1a; color:#3a5a3a; cursor:not-allowed; opacity:1 !important; }
    .hint { font-size:11px; color:#3a5a3a; text-align:center; margin-top:8px; }
    .cta-row { display:flex; gap:8px; margin-top:12px; }
    .cta-row .btn { flex:1; }
    .footer { text-align:center; margin-top:28px; font-size:10px; color:#2a3a2a; line-height:1.8; }
    .footer a { color:#00cc77; text-decoration:none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .cursor { display:inline-block; width:7px; height:13px; background:#00ff94; vertical-align:middle; margin-left:2px; animation:blink 1s ease-in-out infinite; }
    @keyframes glow-pulse { 0%,100%{box-shadow:0 0 6px #00ff94} 50%{box-shadow:0 0 14px #00ff94,0 0 24px rgba(0,255,148,0.3)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { display:inline-block; width:10px; height:10px; border:1.5px solid rgba(0,255,148,0.3); border-top-color:#00ff94; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:4px; }
  </style>
</head>

<script>
(function() {
  var cv = document.getElementById('bgCanvas');
  var cx = cv.getContext('2d');
  var nodes = [];
  for (var i = 0; i < 24; i++) nodes.push({ x: Math.random()*1400, y: Math.random()*900 });
  function draw() {
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    var W = cv.width, H = cv.height;
    cx.fillStyle = '#0d1117'; cx.fillRect(0,0,W,H);
    cx.strokeStyle = 'rgba(0,255,148,0.05)'; cx.lineWidth = 0.5;
    for (var x=0;x<=W;x+=40){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for (var y=0;y<=H;y+=40){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    var sc = Math.max(W/1400,H/900);
    var sn = nodes.map(function(n){return{x:n.x*sc,y:n.y*sc};});
    for (var i=0;i<sn.length;i++) for (var j=i+1;j<sn.length;j++) {
      var dx=sn[i].x-sn[j].x, dy=sn[i].y-sn[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<180){cx.strokeStyle='rgba(0,255,148,'+(1-d/180)*0.2+')';cx.lineWidth=0.5;cx.beginPath();cx.moveTo(sn[i].x,sn[i].y);cx.lineTo(sn[j].x,sn[j].y);cx.stroke();}
    }
    sn.forEach(function(n){cx.beginPath();cx.arc(n.x,n.y,2,0,Math.PI*2);cx.fillStyle='rgba(0,255,148,0.4)';cx.fill();});
  }
  window.addEventListener('resize', draw); draw();

  window.drawCardBg = function(h) {
    var c = document.getElementById('cardBg');
    if (!c) return;
    c.width = 400; c.height = h || 580;
    var ctx = c.getContext('2d');
    var W = 400, H = c.height;
    ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = 'rgba(0,255,148,0.07)'; ctx.lineWidth = 0.5;
    for (var x=0;x<=W;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for (var y=0;y<=H;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    var ns=[{x:40,y:50},{x:180,y:22},{x:320,y:58},{x:380,y:140},{x:15,y:200},{x:210,y:160},{x:360,y:230},{x:70,y:300},{x:230,y:280},{x:385,y:360},{x:90,y:420},{x:300,y:390},{x:20,y:500},{x:200,y:470},{x:375,y:520},{x:80,y:560}];
    for (var i=0;i<ns.length;i++) for (var j=i+1;j<ns.length;j++) {
      var dx=ns[i].x-ns[j].x, dy=ns[i].y-ns[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<145){ctx.strokeStyle='rgba(0,255,148,'+(1-d/145)*0.25+')';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(ns[i].x,ns[i].y);ctx.lineTo(ns[j].x,ns[j].y);ctx.stroke();}
    }
    ns.forEach(function(n){ctx.beginPath();ctx.arc(n.x,n.y,1.5,0,Math.PI*2);ctx.fillStyle='rgba(0,255,148,0.5)';ctx.fill();});
    [[50,45,14],[360,H-40,12],[350,220,9]].forEach(function(h){
      ctx.beginPath();
      for(var i=0;i<6;i++){var a=(Math.PI/3)*i-Math.PI/6;i===0?ctx.moveTo(h[0]+h[2]*Math.cos(a),h[1]+h[2]*Math.sin(a)):ctx.lineTo(h[0]+h[2]*Math.cos(a),h[1]+h[2]*Math.sin(a));}
      ctx.closePath(); ctx.strokeStyle='rgba(0,255,148,0.16)'; ctx.lineWidth=0.5; ctx.stroke();
    });
    var g=ctx.createLinearGradient(0,0,W,H*0.35);
    g.addColorStop(0,'rgba(0,255,148,0.03)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  };

  window.drawQR = function(url) {
    var tmp = document.createElement('div');
    tmp.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(tmp);
    try {
      new QRCode(tmp, { text:url, width:72, height:72, colorDark:'#00ff94', colorLight:'#0d1117', correctLevel:QRCode.CorrectLevel.M });
      setTimeout(function(){
        var inner = tmp.querySelector('canvas');
        var qc = document.getElementById('qrCanvas');
        var ctx = qc.getContext('2d');
        ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,72,72);
        if (inner) ctx.drawImage(inner,0,0,72,72);
        document.body.removeChild(tmp);
      }, 200);
    } catch(e){ document.body.removeChild(tmp); }
  };
})();
</script>

  if (paid >= 7)  return LEVELS[5];
  if (paid >= 4)  return LEVELS[4];
  if (paid >= 2)  return LEVELS[3];
  if (paid === 1) return LEVELS[2];
  if (verified >= 1) return LEVELS[1];
  return LEVELS[0];
}

function totalMonthly() {
  return Object.values(state).reduce((sum, s) => sum + (PLAN_LABELS[s.level]?.money || 0), 0);
}

function generateCard() {
  cardGenerated = true;
  const level  = calcLevel();
  const paid   = Object.values(state).filter(s => s.level && s.level !== 'unverified' && s.level !== 'free').length;
  const money  = totalMonthly();
  const now    = new Date();

  document.getElementById('card-ts').textContent    = now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0');
  document.getElementById('card-lv').textContent    = 'LV.' + level.lv;
  document.getElementById('card-pct').textContent   = level.pct;
  document.getElementById('card-name').innerHTML    = level.name + '<span class="cursor"></span>';
  document.getElementById('card-en').textContent    = level.en;
  document.getElementById('card-score').textContent = paid;
  document.getElementById('card-money').textContent = '$' + money + ' / mo';
  document.getElementById('card-quote').textContent = RANDOM_QUOTE(level.lv);

  // 平台网格 2列
  const el = document.getElementById('card-platforms');
  el.innerHTML = PLATFORMS.map(p => {
    const s    = state[p.key];
    const isV  = s.level !== 'unverified';
    const info = isV ? (PLAN_LABELS[s.level] || { label:s.level, color:'#00cc77' }) : { label:'--', color:'#2a3a2a' };
    // 已验证 FREE 也给亮色
    const planColor = isV && s.level === 'free' ? '#6aaa8a' : info.color;
    const bgColor   = isV ? 'rgba(0,255,148,0.06)' : 'rgba(0,255,148,0.02)';
    const borderColor = isV ? 'rgba(0,255,148,0.2)' : 'rgba(0,255,148,0.05)';
    const nameColor = isV ? '#aaaaaa' : '#3a5a3a';
    return '<div style="background:' + bgColor + ';border-radius:6px;padding:6px 8px;border:1px solid ' + borderColor + ';opacity:' + (isV ? '1' : '0.4') + '">' +
      '<div style="font-size:9px;color:' + nameColor + ';margin-bottom:3px">' + p.name.toUpperCase() + '</div>' +
      '<div style="font-size:12px;color:' + planColor + ';font-weight:700">' + (isV ? info.label.toUpperCase() : '--') + '</div>' +
    '</div>';
  }).join('');

  window.drawCardBg(el.scrollHeight + 300);
  setTimeout(function(){ window.drawCardBg(document.getElementById('shareCard').offsetHeight + 20); }, 100);

  const uid = new URLSearchParams(location.search).get('uid') || 'anon';
  window.drawQR(BOT_URL + '?start=aimaniac_' + uid);

  document.getElementById('shareCard').style.display = 'block';
  document.getElementById('ctaRow').style.display    = 'flex';
  document.getElementById('hint').textContent = '卡片已生成 · 继续验证可提升等级';
  document.getElementById('btn-generate').textContent = '刷新卡片 →';
  document.getElementById('shareCard').scrollIntoView({ behavior:'smooth' });

  // 后端 webhook
  const tgUid = new URLSearchParams(location.search).get('uid') || 'unknown';
  fetch(WEBHOOK, {
  method:'POST', headers:{'Content-Type':'application/json', 'ngrok-skip-browser-warning':'true'},
  body: JSON.stringify({ tgUserId:tgUid, states: Object.fromEntries(PLATFORMS.map(p => [p.key, state[p.key].level])) })
}).catch(e => console.warn('Webhook failed:', e));
}

renderPlatformGrid();
document.getElementById('btn-generate').addEventListener('click', generateCard);

document.getElementById('btn-challenge').addEventListener('click', () => {
  const uid = new URLSearchParams(location.search).get('uid') || 'anon';
  const url = BOT_URL + '?start=aimaniac_' + uid;
  try { navigator.clipboard.writeText(url); } catch(e) {}
  window.open(url, '_blank');
});

document.getElementById('btn-share').addEventListener('click', async () => {
  const btn = document.getElementById('btn-share');
  btn.textContent = '生成中...'; btn.disabled = true;
  try {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    document.head.appendChild(script);
    await new Promise((res,rej) => { script.onload=res; script.onerror=rej; });
    const card = document.getElementById('shareCard');
    const canvas = await html2canvas(card, { backgroundColor:'#0d1117', scale:2, useCORS:true, logging:false });
    const link = document.createElement('a');
    link.download = 'ai-maniac-' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('截图失败，请手动截图保存');
  } finally {
    btn.textContent = '分享卡片'; btn.disabled = false;
  }
});
</script>
</body>
</html>
